name: Update YARA Rules

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-yara-rules:
    name: Build categorized YARA rules
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs track "yara_rule_index.json"
          git lfs track "yara_category_index.json"
          git lfs track "*.zip"
          git lfs track "*.tar.gz"
          git lfs track "*.7z"

      - name: Restore cloned repository cache
        uses: actions/cache@v4
        with:
          path: repos
          key: yara-source-repos-${{ runner.os }}-${{ hashFiles('repos.txt') }}
          restore-keys: |
            yara-source-repos-${{ runner.os }}-

      - name: Show input files
        run: |
          echo "Repositories:"
          sed 's/^/  /' repos.txt
          echo
          echo "Categories:"
          cat categories.json | jq .

      - name: Generate categorized YARA rules
        run: python yara_rule_automation.py

      - name: Write workflow summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          data = json.loads(Path("yara_rule_index.json").read_text(encoding="utf-8"))
          cat_data = json.loads(Path("yara_category_index.json").read_text(encoding="utf-8"))
          category_counts = {
              category: len(entries)
              for category, entries in sorted(data["categories"].items())
              if entries
          }

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("# YARA Rule Update\n\n")
              summary.write(f"- Repositories processed: {data['repo_count']}\n")
              summary.write(f"- Errors: {len(data['errors'])}\n")
              summary.write(f"- Category matches: {sum(category_counts.values())}\n")
              summary.write(f"- Duplicate YARA files: {len(data['duplicates'])}\n")
              summary.write(f"- Unmatched YARA files: {len(data['_unmatched'])}\n")
              summary.write(f"- Validation: {data['validation']['note']}\n\n")
              summary.write("## Category Counts\n\n")
              for category, count in category_counts.items():
                  summary.write(f"- `{category}`: {count}\n")
              summary.write("\n## Category Index (`yara_category_index.json`)\n\n")
              summary.write("| Category | Rule Files |\n")
              summary.write("|----------|------------|\n")
              for category, paths in sorted(cat_data["categories"].items()):
                  summary.write(f"| `{category}` | {len(paths)} |\n")
          PY

      - name: Upload generated rules artifact
        uses: actions/upload-artifact@v4
        with:
          name: yara-rules-output
          path: |
            yara-rules/
            yara_rule_index.json
            yara_category_index.json
          if-no-files-found: error
          retention-days: 14

      - name: Check generated file sizes
        run: |
          too_large="$(find yara-rules -type f -size +99M -print)"
          if [ -n "$too_large" ]; then
            echo "Generated files exceed GitHub's 100 MB per-file limit:"
            echo "$too_large"
            echo "The artifact was uploaded, but these non-LFS files cannot be committed to Git."
            exit 1
          fi
          if [ -f yara_rule_index.json ]; then
            bytes="$(wc -c < yara_rule_index.json)"
            echo "yara_rule_index.json size: ${bytes} bytes"
            echo "yara_rule_index.json is tracked by Git LFS."
          fi

      - name: Commit generated rule updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes yara-rules yara_rule_index.json yara_category_index.json
          if git diff --cached --quiet; then
            echo "No generated rule changes to commit."
          else
            git lfs ls-files
            git commit -m "Update generated YARA rules"
            git push
          fi
